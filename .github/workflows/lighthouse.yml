name: Lighthouse

on:
  # Run after a successful Vercel deployment via the deployment_status webhook.
  deployment_status:
  # Or manually for ad-hoc audits.
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to audit (defaults to LIGHTHOUSE_URL secret)'
        required: false
        type: string

jobs:
  lhci:
    # Only run on successful production deployments to avoid spam from
    # preview deployments (which can be 100s of urls per day).
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.deployment_status.state == 'success' &&
       github.event.deployment_status.environment == 'Production')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Resolve target URL
        id: target
        run: |
          if [ -n "${{ github.event.deployment_status.target_url }}" ]; then
            echo "url=${{ github.event.deployment_status.target_url }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ inputs.url }}" ]; then
            echo "url=${{ inputs.url }}" >> $GITHUB_OUTPUT
          else
            echo "url=${{ secrets.LIGHTHOUSE_URL }}" >> $GITHUB_OUTPUT
          fi

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.15.x

      - name: Run Lighthouse CI
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
        run: |
          # Audit the public sign-in page (the only page accessible without a
          # Clerk session). Authenticated pages would require Clerk testing
          # tokens, which we cover in the Playwright E2E suite separately.
          lhci autorun \
            --collect.url="${{ steps.target.outputs.url }}/sign-in" \
            --collect.numberOfRuns=3 \
            --upload.target=temporary-public-storage \
            --assert.preset=lighthouse:no-pwa \
            --assert.assertions.categories:performance=0.85 \
            --assert.assertions.categories:accessibility=0.95 \
            --assert.assertions.categories:best-practices=0.90 \
            --assert.assertions.categories:seo=0.90 \
          || (echo "::warning::Lighthouse score below threshold — see report URL above" && exit 0)
